name: Run lint for a Go project
run-name: "${{ inputs.project-directory }}"

on:
  workflow_call:
    inputs:
      project-directory:
        required: true
        type: string
        default: "."
        description: "The directory where the Go project is located."

permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  # pull-requests: read

jobs:
  lint-go-project:
    name: "lint: ${{ inputs.project-directory }}"
    runs-on: 'ubuntu-latest'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
            go-version-file: "${{ inputs.project-directory == '' && '.' || inputs.project-directory }}/go.mod"
            cache-dependency-path: "${{ inputs.project-directory == '' && '.' || inputs.project-directory }}/go.sum"
        id: go

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1481404843c368bc19ca9406f87d6e0fc97bdcfd # v7.0.0
        with:
          version: v2.9.0
          # Optional: working directory, useful for monorepos
          working-directory: ${{ inputs.project-directory }}

      - name: generate
        working-directory: ./${{ inputs.project-directory }}
        shell: bash
        run: |
          make generate
          git --no-pager diff && [[ 0 -eq $(git status --porcelain | wc -l) ]]

      - name: generate project files by modulegen
        if: ${{ inputs.project-directory == 'modulegen' }}
        working-directory: ./${{ inputs.project-directory }}
        shell: bash
        run: go run . refresh

      - name: modTidy
        working-directory: ./${{ inputs.project-directory }}
        shell: bash
        run: |
          make tidy
          git --no-pager diff && [[ 0 -eq $(git status --porcelain | wc -l) ]]
